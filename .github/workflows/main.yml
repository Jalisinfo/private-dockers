name: Docker Build and Deploy

on:
  push:
    branches:
      - master

jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
          -t ghcr.io/jalisinfo/jmc-py-redis-mvp:${{ github.sha }} .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/jalisinfo/jmc-py-redis-mvp:${{ github.sha }}

  deploy:

    needs: build

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:

      - name: Deployment Approved
        run: echo "Deploying application..."
